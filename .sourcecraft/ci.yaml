on:
  push:
    - workflows: deploy-tg-bot-workflow
      filter:
        branches: ["master", "main"]
  pull_request:
    - workflows: deploy-tg-bot-workflow
      filter:
        source_branches: ["**", "!test**"]
        target_branches: "main"

tokens:
  SERVICE_CONNECTION_WITH_TOKEN:
    service_connection: "default-service-connection"
    scope: org

workflows:
  deploy-tg-bot-workflow:
    inputs:
      bot-username:
        type: string #- name: Field does not match the pattern /|[a-z][-a-z0-9]{1,61}[a-z0-9]/
        required: true
        description: Your Telegram bot username without _bot from BotFather. Name must match the pattern /|[a-z][-a-z0-9]{1,61}[a-z0-9]/
      bot-token:
        type: string
        default: "YOUR_TG_BOT_TOKEN"
        description: Your Telegram bot token from BotFather
    env:
      YC_BOT_NAME: ${{ inputs.bot-username }}
      TG_BOT_TOKEN: ${{ inputs.bot-token }}
      WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
      GROUP_ID: ${{ secrets.GROUP_ID }}
      ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
      OWNER_ID: ${{ secrets.OWNER_ID }}
      YDB_ENDPOINT: ${{ secrets.YDB_ENDPOINT }}
      YDB_DATABASE: ${{ secrets.YDB_DATABASE }}
      YDB_SERVICE_ACCOUNT_KEY_CONTENT_CREDENTIALS: ${{ secrets.YDB_SERVICE_ACCOUNT_KEY_CONTENT_CREDENTIALS }}
    tasks:
      - name: deploy-tg-backend-task
        cubes: 
          - name: format-name
            script:
              - |
                func_name=$(echo "$YC_BOT_NAME" | tr '[:upper:]' '[:lower:]' | tr -d '_')
                echo "function_name=$func_name" >> $SOURCECRAFT_OUTPUT
                
          - name: deploy-func
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.id_token }}
              YC_SA_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.service_account_id }}
            image: cr.yandex/sourcecraft/yc-iam:latest

          - name: ensure-func
            env:
              YC_IAM_TOKEN: ${{ cubes.deploy-func.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }} 
              YC_FUNCTION_NAME: ${{ cubes.format-name.outputs.function_name }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id "$YC_FOLDER_ID"
                echo "Checking if function exists..."
                if ! yc serverless function get --name="$YC_FUNCTION_NAME" > function_info.txt; then
                  echo "Function does not exist. Creating..."
                  yc serverless function create --name="$YC_FUNCTION_NAME"
                  yc serverless function get --name="$YC_FUNCTION_NAME" > function_info.txt
                else
                  echo "Function already exists."
                fi
                invoke_url=$(awk '/http_invoke_url:/ {print $2; exit}' function_info.txt)
                if [ -n "$invoke_url" ]; then
                  echo "invoke_url=$invoke_url" >> "$SOURCECRAFT_OUTPUT"
                fi

          - name: deploy-func-version
            env:
              YC_IAM_TOKEN: ${{ cubes.deploy-func.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
              YC_FUNCTION_NAME: ${{ cubes.format-name.outputs.function_name }}              
              YC_FUNCTION_RUNTIME: python312
              YC_FUNCTION_ENTRYPOINT: dynamic_handler.handler
              YC_FUNCTION_MEMORY: 256m
              YC_FUNCTION_EXECUTION_TIMEOUT: 30s              
              SOURCE_PATH: "."
              ENVIRONMENT: "BOT_TOKEN=${{ inputs.bot-token }},WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }},GROUP_ID=${{ secrets.GROUP_ID }},ADMIN_IDS=${{ secrets.ADMIN_IDS }},OWNER_ID=${{ secrets.OWNER_ID }},YDB_ENDPOINT=${{ secrets.YDB_ENDPOINT }},YDB_DATABASE=${{ secrets.YDB_DATABASE }},YDB_SERVICE_ACCOUNT_KEY_CONTENT_CREDENTIALS=${{ secrets.YDB_SERVICE_ACCOUNT_KEY_CONTENT_CREDENTIALS }},TIMEZONE=Europe/Moscow"
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id "$YC_FOLDER_ID"
                echo "Deploying new function version..."
                yc serverless function version create \
                  --function-name="$YC_FUNCTION_NAME" \
                  --runtime="$YC_FUNCTION_RUNTIME" \
                  --entrypoint="$YC_FUNCTION_ENTRYPOINT" \
                  --memory="$YC_FUNCTION_MEMORY" \
                  --execution-timeout="$YC_FUNCTION_EXECUTION_TIMEOUT" \
                  --environment="$ENVIRONMENT" \
                  --source-path="$SOURCE_PATH"
                yc serverless function allow-unauthenticated-invoke --name="$YC_FUNCTION_NAME"

          - name: register-with-botfather
            env:
              TG_BOT_TOKEN: ${{ inputs.bot-token }}
            script:
              - |
                # Check if TG_BOT_TOKEN is set and not equal to placeholder
                if [ -n "$TG_BOT_TOKEN" ] && [ "$TG_BOT_TOKEN" != "YOUR_TG_BOT_TOKEN" ]; then
                    echo "TG_BOT_TOKEN is properly set"
                    echo "Setting webhook..."
                    curl --request POST --url https://api.telegram.org/bot$TG_BOT_TOKEN/setWebhook?url=${{cubes.ensure-func.outputs.invoke_url}}
                    echo "Webhook set!"
                else
                    echo "TG_BOT_TOKEN is either not set or equals placeholder value"
                fi

          - name: get-outputs
            script:
              - |
                echo "invoke_url=${{ cubes.ensure-func.outputs.invoke_url }}"
                echo "invoke_url=${{ cubes.ensure-func.outputs.invoke_url }}" > invoke_url.txt
            artifacts:
              paths:
                - invoke_url.txt
